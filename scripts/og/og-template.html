<!doctype html>
<html lang="de">
<head>
<meta charset="utf-8" />
<!-- Wird nur von scripts/og/capture-og.mjs gerendert (1200x630 → public/og.png).
     Öffentlich sichtbares Bild: bewusst NUR Name + Rolle, nichts Inhaltliches. -->
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;700&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet" />
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 1200px; height: 630px; overflow: hidden; }
  body {
    position: relative;
    background: #0a0b12;
    font-family: "Space Grotesk", sans-serif;
    color: #f1f2f7;
  }
  .aurora { position: absolute; border-radius: 50%; filter: blur(90px); }
  .aurora.cyan { width: 620px; height: 620px; right: -180px; top: -260px; background: rgba(34, 211, 238, 0.16); }
  .aurora.violet { width: 560px; height: 560px; left: -160px; bottom: -260px; background: rgba(139, 92, 246, 0.18); }
  .frame {
    position: absolute; inset: 24px;
    border: 1px solid #2f3354; border-radius: 24px;
  }
  .content {
    position: absolute; inset: 0;
    display: flex; flex-direction: column; justify-content: center;
    padding: 0 96px;
  }
  .monogram {
    width: 72px; height: 72px; border-radius: 16px;
    border: 1px solid rgba(34, 211, 238, 0.35);
    background: rgba(34, 211, 238, 0.1);
    display: flex; align-items: center; justify-content: center;
    font-family: "JetBrains Mono", monospace;
    font-weight: 700; font-size: 30px; color: #67e8f9;
    margin-bottom: 40px;
  }
  .eyebrow {
    font-family: "JetBrains Mono", monospace;
    font-size: 21px; letter-spacing: 0.14em;
    color: #22d3ee; text-transform: uppercase;
    margin-bottom: 18px;
  }
  h1 { font-size: 78px; font-weight: 700; letter-spacing: -0.02em; line-height: 1.05; }
  .footer {
    position: absolute; left: 96px; right: 96px; bottom: 64px;
    display: flex; align-items: center; gap: 14px;
    font-family: "JetBrains Mono", monospace;
    font-size: 19px; color: #8b90b0;
  }
  .dot { width: 7px; height: 7px; border-radius: 50%; background: #34d399; }
</style>
</head>
<body>
  <div class="aurora cyan"></div>
  <div class="aurora violet"></div>
  <div class="frame"></div>
  <div class="content">
    <div class="monogram">CT</div>
    <div class="eyebrow">// KI-Entwickler &amp; Innovation Specialist</div>
    <h1>Christof Treitges</h1>
  </div>
  <div class="footer">
    <span class="dot"></span>
    <span>Privates Portfolio &middot; Zugang per Einladung</span>
  </div>
</body>
</html>
